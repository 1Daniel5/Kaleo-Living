<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <style>
    .brand { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 72px; font-weight: 400; fill: #1C1C1C; letter-spacing: 0.08em; }
    .tag { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300; fill: #8C7B6B; letter-spacing: 0.35em; text-transform: uppercase; }
    .line { stroke: #8C7B6B; stroke-width: 0.5; }
